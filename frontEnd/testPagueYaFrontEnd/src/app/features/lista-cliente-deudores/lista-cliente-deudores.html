<h2>Gestion de Cuentas Campaña 2026-56565</h2>

<table *ngIf="data$ | async as data" border="1">

  <thead>
    <tr>
      <th>Identificación</th>
      <th>Nombre</th>
      <th>Monto deuda</th>
      <th>Telefono</th>
      <th>Mail</th>
      <th>Empresa</th>
      <th>Dias de Mora</th>
      <th> </th>
    </tr>
  </thead>

 
  <tbody *ngFor="let item of data"; index as i >
    <tr *ngIf="item.diasMora>120" >
      <td >{{ item.identificacion }}</td>
      <td >{{ item.nombre }}</td>
      <td >{{ item.montoDeuda }}</td>
      <td >{{ item.telefono }}</td>
      <td >{{ item.email }}</td>
      <td >{{ item.empresa  }}</td>
      <td >{{ item.diasMora  }}</td>
      <td ><button mat-raised-button color="primary" (click)="openModal(item.identificacion,item.nombre,item.telefono)">Gestionar</button></td>
    </tr>
  </tbody>
 

</table>
